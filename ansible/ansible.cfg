# ansible/ansible.cfg
#
# Ansible reads this file automatically when you run `ansible-playbook` from
# the ansible/ directory (or any subdirectory). It sets project-wide defaults
# so you don't have to repeat flags on every command.
#
# Key settings explained:
#   inventory        — where to find the hosts file (relative to this file)
#   host_key_checking — for SSH targets, skip the "do you trust this host?" prompt.
#                       Safe to disable for automation; we're connecting to localhost anyway.
#   retry_files_enabled — Ansible creates *.retry files when a play fails so you can
#                         re-run only the failed hosts. Disabled here to keep the folder clean.
#   stdout_callback  — "yaml" output is much easier to read than the default one-liner format.
#   interpreter_python — tells Ansible to use "auto" Python detection instead of hard-coding
#                        /usr/bin/python (which may not exist on newer distros).

[defaults]
inventory            = inventory/hosts.ini
host_key_checking    = False
retry_files_enabled  = False
stdout_callback      = yaml
interpreter_python   = auto_silent

[privilege_escalation]
become       = False
become_method = sudo
