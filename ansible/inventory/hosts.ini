# ansible/inventory/hosts.ini
#
# Why localhost?
# EKS worker nodes run inside a private VPC subnet — there's no way to SSH
# into them directly. Instead of connecting to the nodes, we run all Ansible
# tasks ON the control machine (your laptop or the Jenkins agent) using the
# local connection method. The tasks then talk to AWS and Kubernetes via the
# aws CLI and helm/kubectl tools that are already installed there.
#
# ansible_connection=local   → no SSH involved; Ansible just runs commands
#                              directly in the current shell, same as you
#                              would type them yourself.

[local]
localhost ansible_connection=local
