apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: engine-ingress
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: engine.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: engine-external
                port:
                  number: 8080
